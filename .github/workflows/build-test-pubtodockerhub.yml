name: "buildx-test-pubtodockerhub"

env:
  DOCKERHUB_IMAGE_PREFIX: abesesr/theses

on:
  push:
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '.properties'
  workflow_dispatch:


jobs:
  build-test-pubtodockerhub:
    runs-on: ubuntu-latest
    steps:

      - name: "Build: checkout source code"
        uses: actions/checkout@v6

      - name: "Push: prepare version from git tags/branchs"
        id: docker_tag_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_IMAGE_PREFIX }}
      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4
      - name: "Login to DockerHub"
        uses: docker/login-action@v4
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Buildx api-recherche and push"
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/')) }}
          target: api-recherche-image
          tags: ${{ steps.docker_tag_meta.outputs.tags }}-api-recherche
